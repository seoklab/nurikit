version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "miniconda3-3.12-24.9"
  jobs:
    post_checkout:
      - (git show -s --format="%an" | grep -vq "\[bot\]$") || exit 183
      - |
        if git show -s --format="%B" | grep -Eq "\[(skip docs|docs skip)\]"; then
          exit 183
        fi
    install:
      - |
        cmake -S . -B install -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DNURI_BUILD_TESTING=OFF \
          -DNURI_ENABLE_IPO=OFF \
          -DNURI_OPTIMIZATION_LEVEL=O0
      - python -m pip install '.[docs]' -v -Cbuild-dir=install -Cbuild.verbose=true
      - cmake --build install --target clean
    pre_build:
      - |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DNURI_BUILD_TESTING=OFF \
          -DNURI_BUILD_DOCS=ON \
          -DNURI_BUILD_PYTHON_DOCS=ON \
          -DNURI_ENABLE_IPO=OFF \
          -DNURI_OPTIMIZATION_LEVEL=O0
      - cmake --build build --target NuriDocs

conda:
  environment: docs/environment.yaml

sphinx:
  configuration: "python/docs/conf.py"
