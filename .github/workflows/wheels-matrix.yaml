name: Build wheels in matrix

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      emulate-version:
        type: string
        description: "Version to emulate"
        required: false
        default: ""
      minimal:
        type: boolean
        description: "Minimal build"
        required: false
        default: false
  push:
    branches:
      - main
    paths:
      - ".github/scripts/build-lib.sh"
      - ".github/scripts/wheel-targets.sh"
      - ".github/workflows/wheels-matrix.yaml"
      - ".github/workflows/_base-build.yaml"
      - ".github/workflows/_wheel-build.yaml"
      - ".github/workflows/_wheel-targets.yaml"
      - "cmake/**"
      - "include/**"
      - "src/**"
      - "python/**"
      - "third-party/**"
      - "**/.clang-*"
      - "**/CMakeLists.txt"
      - pyproject.toml.in

defaults:
  run:
    shell: bash

jobs:
  common:
    uses: ./.github/workflows/_base-build.yaml
    with:
      emulate-version: ${{ inputs.emulate-version }}

  targets:
    uses: ./.github/workflows/_wheel-targets.yaml
    with:
      minimal: ${{ inputs.minimal }}

  build-wheels:
    needs: [common, targets]

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.targets.outputs.include) }}

    uses: ./.github/workflows/_wheel-build.yaml
    with:
      python: ${{ matrix.python }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
